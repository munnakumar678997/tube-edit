name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          java -jar "signer/apksigner.jar" sign \
            --key "signer/apkeasytool.pk8" \
            --cert "signer/apkeasytool.pem" \
            --v4-signing-enabled false \
            --out "app/build/outputs/apk/release/tube-edit-signed.apk" \
            "app/build/outputs/apk/release/app-release-unsigned.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tube-edit-apk
          path: app/build/outputs/apk/release/tube-edit-signed.apk

      - name: Publish/Update "latest" release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Automatically built APK. Always contains the latest code from main."
          files: app/build/outputs/apk/release/tube-edit-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
